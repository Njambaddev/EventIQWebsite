<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C97A"/>
      <stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(2,10)">
    <rect width="44" height="44" rx="10" fill="#0D0D0D"/>
    <rect x="1" y="1" width="42" height="42" rx="9" fill="none" stroke="#C9A84C" stroke-opacity="0.35"/>
    <g fill="url(#gold)">
      <rect x="9"  y="16" width="4" height="12" rx="2"/>
      <rect x="16" y="10" width="4" height="24" rx="2"/>
      <rect x="23" y="7"  width="4" height="30" rx="2"/>
      <rect x="30" y="13" width="4" height="18" rx="2"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="60" y="41" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="32" font-weight="400" letter-spacing="0.5">
    <tspan fill="#FDFBF6">Event </tspan><tspan fill="url(#gold)">IQ</tspan>
  </text>
</svg>
